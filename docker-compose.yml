services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-arcade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arcade
      POSTGRES_PASSWORD: arcade_password
      POSTGRES_DB: ai_arcade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcade -d ai_arcade"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ai-arcade-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: ai-arcade-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/ai-arcade;
      /usr/bin/mc anonymous set download local/ai-arcade;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
